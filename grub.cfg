set timeout=5
set default=0

menuentry "Kernel 32" {
  set gfxpayload=keep
  insmod all_video
  multiboot2 /boot/kernel.bin
  boot
}

menuentry "Kernel 64" {
  set gfxpayload=keep
  insmod all_video
  multiboot2 /boot/kernel.bin     # quando gerar iso64, /boot/kernel.bin deve ser kernel64.bin
  boot
}